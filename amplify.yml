version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd frontend
        - npm ci
        - |
          sed -i "s|YOUR_FASTAPI_URL|${API_BASE_URL}|g" src/environments/environment.prod.ts
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: frontend/dist/frontend-ng/browser
    files:
      - '**/*'
  cache:
    paths:
      - frontend/node_modules/**/*
